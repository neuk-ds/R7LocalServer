name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        run: .\gradlew.bat :composeApp:packageInnoSetup

      - name: Create Windows app zip
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive `
            -Path composeApp/build/compose/binaries/main/app/R7LocalServer `
            -DestinationPath dist/R7LocalServer-windows.zip `
            -Force

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: composeApp/build/inno/*.exe

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-zip
          path: dist/R7LocalServer-windows.zip

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build deb
        run: ./gradlew :composeApp:packageDeb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb

  plugins:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Package plugins
        run: |
          mkdir -p dist
          for dir in plugins/*/; do
            name="${dir#plugins/}"
            name="${name%/}"
            (cd "plugins/${name}" && zip -r "../../dist/${name}.zip" .)
            mv "dist/${name}.zip" "dist/${name}.plugin"
          done

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v5
        with:
          name: plugins
          path: dist/*.plugin

  release:
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux
      - plugins

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/**/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/**/* \
              --title "$RELEASE_TAG" \
              --notes "Release $RELEASE_TAG"
          fi