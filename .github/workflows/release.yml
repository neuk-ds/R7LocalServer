name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        run: .\gradlew.bat :composeApp:packageInnoSetup

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: composeApp/build/inno/*.exe

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build deb
        run: ./gradlew :composeApp:packageDeb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-deb
          path: composeApp/build/compose/binaries/main/deb/*.deb

  release:
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" dist/**/* \
            --title "$RELEASE_TAG" \
            --notes "Release $RELEASE_TAG"