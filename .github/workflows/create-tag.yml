name: Create Tag

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force re-tag and re-release if tag already exists
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read application version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -E '^val applicationVersion = ' composeApp/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check version
        shell: bash
        run: |
          if [ -z "${{ steps.version.outputs.version }}" ]; then
            echo "applicationVersion not found"
            exit 1
          fi

      - name: Check tag does not exist
        shell: bash
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            if [ "${{ inputs.force }}" != "true" ]; then
              echo "Tag ${{ steps.version.outputs.tag }} already exists. Use force=true to re-tag."
              exit 1
            fi
            echo "Force mode: deleting existing tag and release"
            git push --delete origin "${{ steps.version.outputs.tag }}" || true
            git tag --delete "${{ steps.version.outputs.tag }}" || true
            gh release delete "${{ steps.version.outputs.tag }}" --yes || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Run release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh workflow run release.yml \
            --ref "${{ steps.version.outputs.tag }}" \
            -f tag="${{ steps.version.outputs.tag }}"